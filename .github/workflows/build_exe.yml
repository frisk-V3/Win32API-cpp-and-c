name: Build Win32 Header Gen EXE

# mainブランチにプッシュした時に実行
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 手動実行ボタンも有効化

jobs:
  build:
    runs-on: windows-latest # Windows環境でビルド

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # win32more と pyinstaller を直接インストール
          pip install win32more pyinstaller

      - name: Build Executable with PyInstaller
        run: |
          # --onefile: 1つのEXEにまとめる
          # --noconsole: GUI起動時に黒い画面を出さない
          # --name: 出力ファイル名指定
          pyinstaller --onefile --noconsole --name "Win32HeaderGen" main.py

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Win32HeaderGen-Binary
          path: dist/Win32HeaderGen.exe
          retention-days: 7
