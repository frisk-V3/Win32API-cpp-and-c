name: Build and Release EXE

on:
  push:
    tags:
      - 'v*' # v1.0.0 などのタグがついた時に発動

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install win32metadata pyinstaller

      - name: Build Executable
        run: |
          # 1つのEXEにまとめ、コンソール非表示、アイコンなし
          pyinstaller --onefile --noconsole --name "Win32HeaderGen" main.py

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Win32HeaderGen.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
