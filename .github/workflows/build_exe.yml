name: Build Win32 Header Gen EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies Directly
        run: |
          python -m pip install --upgrade pip
          # ここで直接ライブラリを指定（requirements.txtを使わない）
          pip install win32more pyinstaller

      - name: Build Executable
        run: |
          pyinstaller --onefile --noconsole --name "Win32HeaderGen" main.py

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Win32HeaderGen-Binary
          path: dist/Win32HeaderGen.exe
