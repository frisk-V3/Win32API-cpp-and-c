name: Continuous Build EXE

on:
  push:
    branches: [ "main" ] # mainにpushされたら実行
  workflow_dispatch:      # 手動実行ボタンも有効化

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # pipのキャッシュを有効化して高速化

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install win32metadata pyinstaller

      - name: Build Executable with PyInstaller
        shell: pwsh
        run: |
          # --onefile: 1つのEXEに集約
          # --noconsole: GUIアプリとして起動（黒い画面を出さない）
          # --clean: キャッシュをクリアしてビルド
          pyinstaller --onefile --noconsole --clean --name "Win32HeaderGen" main.py

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Win32HeaderGen-Latest-EXE
          path: dist/Win32HeaderGen.exe
          retention-days: 90 # 90日間保存
